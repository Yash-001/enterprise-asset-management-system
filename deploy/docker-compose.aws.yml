version: "3.9"

services:
  # ============================
  # Nginx Reverse Proxy + HTTPS
  # ============================
  nginx:
    image: nginx:alpine
    container_name: eams-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - eams-network

  # ============================
  # Certbot (Let's Encrypt)
  # ============================
  certbot:
    image: certbot/certbot
    container_name: eams-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - eams-network

  # ============================
  # Application
  # ============================
  app:
    image: ${DOCKER_IMAGE:-ghcr.io/your-org/enterprise-asset-management-system:latest}
    container_name: eams-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-12h}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@eams.com}
      STORAGE_PATH: /app/uploads
      LOG_PATH: /var/log/eams
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/var/log/eams
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/management/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - eams-network

  # ============================
  # PostgreSQL (if not using RDS)
  # ============================
  postgres:
    image: postgres:16-alpine
    container_name: eams-postgres
    restart: unless-stopped
    profiles:
      - self-hosted-db
    environment:
      POSTGRES_DB: ${DB_NAME:-enterprise_asset_management}
      POSTGRES_USER: ${DB_USERNAME:-eams_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-eams_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eams-network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local

networks:
  eams-network:
    driver: bridge
