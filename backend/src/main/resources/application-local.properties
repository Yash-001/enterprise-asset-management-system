# =========================
# LOCAL Profile (IDE / bare-metal dev)
# =========================

# JPA - verbose SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool - minimal
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5

# Logging - verbose
logging.level.com.yashconsulting.eams=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.flywaydb=DEBUG

# Actuator - all endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Thymeleaf - no cache
spring.thymeleaf.cache=false

# Swagger
springdoc.swagger-ui.enabled=true

# Mail - MailHog/Mailpit on localhost
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Scheduler - enabled
eams.scheduler.cron.midnight=0 0 0 * * ?
eams.scheduler.cron.hourly=0 0 * * * ?
