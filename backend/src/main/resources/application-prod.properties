# =========================
# PROD Profile
# =========================

# Database - provided via environment variables
# Supports both Render (DB_URL) and standard deployments
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA - no SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Connection Pool - tuned for cloud (Render starter: 97 max connections)
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:15}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:30000}
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_DETECTION:60000}

# Flyway - safe production settings
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true

# Logging - stdout for cloud platforms (Render, Docker, etc.)
logging.level.root=WARN
logging.level.com.yashconsulting.eams=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# File logging (optional - only when LOG_PATH is set)
logging.file.name=${LOG_PATH:}
logging.logback.rollingpolicy.max-file-size=100MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=3GB

# Actuator - health endpoint for Render health checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/management
management.endpoint.health.probes.enabled=true

# Thymeleaf - cached in production
spring.thymeleaf.cache=true

# Swagger - disabled in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# JWT - must be provided via env (never hardcode)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:12h}

# Server tuning
server.port=${PORT:8080}
server.tomcat.max-threads=${TOMCAT_MAX_THREADS:200}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:100}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:8192}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024
