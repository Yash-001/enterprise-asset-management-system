# =========================
# PROD Profile
# =========================

# Database - must be provided via environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA - no SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Connection Pool - production tuned
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=120000

# Flyway - safe production settings
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true

# Logging - structured for log aggregation
logging.level.root=WARN
logging.level.com.yashconsulting.eams=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=INFO
logging.file.name=${LOG_PATH:/var/log/eams}/eams-application.log
logging.logback.rollingpolicy.max-file-size=100MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=3GB

# Actuator - restricted in production
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/management

# Thymeleaf - cached in production
spring.thymeleaf.cache=true

# Swagger - disabled in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# JWT - must be overridden via env in production
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:12h}

# Server tuning
server.tomcat.max-threads=${TOMCAT_MAX_THREADS:200}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:100}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:8192}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024
