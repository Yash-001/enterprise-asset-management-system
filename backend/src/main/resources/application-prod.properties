# =========================
# PROD Profile
# =========================

# Database - enforced from env (no defaults)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA - silent
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Connection Pool - production tuned
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:10}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:25}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_DETECTION:120000}

# Flyway - strict
spring.flyway.clean-disabled=true

# JWT - must be set externally (no fallback)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:12h}

# Logging - stdout only, minimal
logging.level.root=WARN
logging.level.com.yashconsulting.eams=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=INFO
logging.file.name=${LOG_PATH:}

# Actuator - restricted
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Thymeleaf - cached
spring.thymeleaf.cache=true

# Swagger - disabled
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Server tuning
server.port=${PORT:8080}
server.tomcat.max-threads=${TOMCAT_MAX_THREADS:200}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:100}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:8192}

# Mail - production SMTP
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# CORS - production origins
eams.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://eams.example.com}
