# ============================================================================
# PRODUCTION PROFILE — Render Deployment
# ============================================================================
# This profile is activated via: SPRING_PROFILES_ACTIVE=prod
# All secrets MUST be provided via environment variables (no defaults).
# ============================================================================

# =========================
# Server — Render provides PORT
# =========================
server.port=${PORT:8080}
server.tomcat.max-threads=${TOMCAT_MAX_THREADS:200}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:100}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:8192}

# =========================
# Database — Render PostgreSQL (external)
# =========================
# Uses Render's individual PG* variables (no JDBC URL conversion needed).
# Fallbacks enable local development without changes.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:enterprise_asset_management}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# HikariCP — Production Tuned for Render Free (97 max connections)
# =========================
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=EamsHikariPool

# =========================
# JPA / Hibernate — Production
# =========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =========================
# Flyway — Production Safe
# =========================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# =========================
# JWT — Must be set via environment variables
# =========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:PT12H}

# =========================
# Logging — Stdout only (Render captures stdout)
# =========================
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.level.com.yashconsulting=DEBUG

logging.level.root=WARN
logging.level.com.yashconsulting.eams=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
#logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.flywaydb=INFO
logging.level.com.zaxxer.hikari=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# =========================
# Actuator — Minimal exposure in production
# =========================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# =========================
# Swagger — Disabled in production
# =========================
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# =========================
# Thymeleaf — Cached
# =========================
spring.thymeleaf.cache=true

# =========================
# Compression — Already in base, reinforced here
# =========================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# =========================
# Graceful Shutdown — Already in base, reinforced here
# =========================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# =========================
# Mail — Production SMTP (env-driven)
# =========================
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

management.health.mail.enabled=false

# =========================
# CORS — Production origins (set via env)
# =========================
eams.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# =========================
# Scheduler — Enabled in production
# =========================
eams.scheduler.cron.midnight=${SCHEDULER_CRON_MIDNIGHT:0 0 0 * * ?}
eams.scheduler.cron.hourly=${SCHEDULER_CRON_HOURLY:0 0 * * * ?}
