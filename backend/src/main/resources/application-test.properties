# =========================
# TEST Profile
# =========================

# Database - Testcontainers will override these
spring.datasource.url=jdbc:postgresql://localhost:5432/eams_test
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA
spring.jpa.show-sql=false

# Connection Pool - minimal for tests
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3

# Flyway
spring.flyway.clean-disabled=false

# Logging - minimal noise in test output
logging.level.com.yashconsulting.eams=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=WARN
logging.level.org.flywaydb=WARN

# Mail - disable actual sending
spring.mail.host=localhost
spring.mail.port=1025

# Scheduler - disable in tests
eams.scheduler.cron.midnight=-
eams.scheduler.cron.hourly=-

# Actuator - health only for tests
management.endpoints.web.exposure.include=health

# Thymeleaf
spring.thymeleaf.cache=false

# Swagger disabled in tests
springdoc.swagger-ui.enabled=false
