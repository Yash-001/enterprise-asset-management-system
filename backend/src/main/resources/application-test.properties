# =========================
# TEST Profile
# =========================

# Database - Testcontainers override or local test DB
spring.datasource.url=jdbc:postgresql://localhost:5432/eams_test

# JPA - silent
spring.jpa.show-sql=false

# Connection Pool - minimal
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3

# Flyway - allow clean for test reset
spring.flyway.clean-disabled=false

# Logging - minimal
logging.level.root=WARN
logging.level.com.yashconsulting.eams=WARN
logging.level.org.springframework=WARN
logging.level.org.flywaydb=WARN

# Mail - local MailHog (no real sending)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false

# Scheduler - disabled
eams.scheduler.cron.midnight=-
eams.scheduler.cron.hourly=-

# Actuator - health only
management.endpoints.web.exposure.include=health

# Swagger - disabled
springdoc.swagger-ui.enabled=false

# Thymeleaf - no cache
spring.thymeleaf.cache=false
