# =========================
# DEV Profile (Docker Compose / shared dev environment)
# =========================

# JPA - SQL visible but not excessively verbose
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.maximum-pool-size=10

# Logging
logging.level.com.yashconsulting.eams=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.flywaydb=INFO

# Actuator - all endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Thymeleaf - no cache
spring.thymeleaf.cache=false

# Swagger
springdoc.swagger-ui.enabled=true

# Mail - real SMTP if configured, otherwise safe defaults
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
