# =========================
# DEV Profile
# =========================

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/enterprise_asset_management
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA - verbose SQL for development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool - smaller for dev
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5

# Flyway
logging.level.org.flywaydb=DEBUG

# Logging - verbose for development
logging.level.com.yashconsulting.eams=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG

# Actuator - all endpoints exposed in dev
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Thymeleaf - disable cache for hot reload
spring.thymeleaf.cache=false

# Swagger enabled
springdoc.swagger-ui.enabled=true
