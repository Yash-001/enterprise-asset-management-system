spring.application.name=enterprise-asset-management
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}

# =========================
# Graceful Shutdown
# =========================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# =========================
# PostgreSQL
# =========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/enterprise_asset_management}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# HikariCP Connection Pool
# =========================
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:20}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:30000}
spring.datasource.hikari.pool-name=EamsHikariPool
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_DETECTION:60000}

# =========================
# JPA
# =========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# =========================
# Flyway
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# =========================
# JWT Settings
# =========================
jwt.secret=${JWT_SECRET:MzRjYjVkNmU3YzhhOWI0ZTEwZjJhM2M1ZTZiN2Q4ZTkxMGExMmIzYzRkNWU2ZjdhOGI5YzBkMWUyZjNhNGI1Yw==}
jwt.expiration=${JWT_EXPIRATION:24h}

# =========================
# File Storage
# =========================
eams.storage.local.path=${STORAGE_PATH:./uploads}

# =========================
# Multipart Upload
# =========================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}

# =========================
# Mail (Spring Mail)
# =========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

eams.mail.from=${MAIL_FROM:noreply@eams.com}
eams.mail.from-name=${MAIL_FROM_NAME:EAMS System}

# =========================
# Thymeleaf
# =========================
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =========================
# Scheduler Configuration
# =========================
eams.scheduler.cron.midnight=${SCHEDULER_CRON_MIDNIGHT:0 0 0 * * ?}
eams.scheduler.cron.hourly=${SCHEDULER_CRON_HOURLY:0 0 * * * ?}
eams.scheduler.maintenance-reminder-days=${SCHEDULER_REMINDER_DAYS:7}

# =========================
# Actuator
# =========================
management.endpoints.web.exposure.include=health,info,metrics,flyway,loggers
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.mail.enabled=true
management.info.env.enabled=true

# =========================
# Global Logging
# =========================
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.level.root=INFO
logging.level.com.yashconsulting.eams=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
