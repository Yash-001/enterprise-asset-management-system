spring.application.name=enterprise-asset-management
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# =========================
# Server
# =========================
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# =========================
# Database
# =========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/enterprise_asset_management}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# HikariCP Connection Pool
# =========================
spring.datasource.hikari.pool-name=EamsHikariPool
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:15}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:30000}
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_DETECTION:60000}

# =========================
# JPA
# =========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# =========================
# Flyway
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE:true}
spring.flyway.validate-on-migrate=true

# =========================
# JWT
# =========================
jwt.secret=${JWT_SECRET:MzRjYjVkNmU3YzhhOWI0ZTEwZjJhM2M1ZTZiN2Q4ZTkxMGExMmIzYzRkNWU2ZjdhOGI5YzBkMWUyZjNhNGI1Yw==}
jwt.expiration=${JWT_EXPIRATION:24h}

# =========================
# Mail
# =========================
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
eams.mail.from=${MAIL_FROM:noreply@eams.com}
eams.mail.from-name=${MAIL_FROM_NAME:EAMS System}

# =========================
# File Storage
# =========================
eams.storage.local.path=${STORAGE_PATH:./uploads}

# =========================
# Multipart Upload
# =========================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}

# =========================
# Thymeleaf
# =========================
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =========================
# Scheduler
# =========================
eams.scheduler.cron.midnight=${SCHEDULER_CRON_MIDNIGHT:0 0 0 * * ?}
eams.scheduler.cron.hourly=${SCHEDULER_CRON_HOURLY:0 0 * * * ?}
eams.scheduler.maintenance-reminder-days=${SCHEDULER_REMINDER_DAYS:7}

# =========================
# CORS
# =========================
eams.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
eams.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
eams.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
eams.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
eams.cors.max-age=${CORS_MAX_AGE:3600}

# =========================
# Actuator
# =========================
management.endpoints.web.base-path=/management
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.info.env.enabled=true

# =========================
# Logging (base)
# =========================
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.level.root=INFO
logging.level.com.yashconsulting.eams=INFO
logging.level.org.springframework.security=WARN
