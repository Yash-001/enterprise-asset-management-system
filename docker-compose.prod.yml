version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: eams-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-enterprise_asset_management}
      POSTGRES_USER: ${DB_USERNAME:-eams_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-eams_user} -d ${DB_NAME:-enterprise_asset_management}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eams-network

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eams-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-enterprise_asset_management}
      DB_USERNAME: ${DB_USERNAME:-eams_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-12h}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@eams.com}
      STORAGE_PATH: /app/uploads
      LOG_PATH: /var/log/eams
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/var/log/eams
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/management/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - eams-network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

networks:
  eams-network:
    driver: bridge
