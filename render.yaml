# ============================================================================
# Render Blueprint — EAMS Backend (Spring Boot 3.5 / Java 21)
# Deploy: Push to GitHub → Render auto-detects this file → provisions infra
# ============================================================================

services:
  - type: web
    name: eams-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: starter
    branch: main
    healthCheckPath: /management/health
    envVars:
      # ─── Spring Profile ───
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # ─── Database (auto-linked from Render PostgreSQL) ───
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: eams-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: eams-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: eams-db
          property: password

      # ─── JWT (auto-generated secret) ───
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "12h"

      # ─── CORS (set to your frontend domain) ───
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      # ─── Mail (configure in Render dashboard) ───
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: "noreply@eams.com"

      # ─── Storage ───
      - key: STORAGE_PATH
        value: "/app/uploads"

databases:
  - name: eams-db
    plan: starter
    region: oregon
    databaseName: enterprise_asset_management
    user: eams_user
    ipAllowList: []
