# ===========================
# Render Blueprint — EAMS Backend
# https://render.com/docs/blueprint-spec
# ===========================

services:
  - type: web
    name: eams-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: starter
    branch: main
    healthCheckPath: /management/health
    envVars:
      # Spring profile
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # Database — Render auto-injects these from the linked database
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: eams-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: eams-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: eams-db
          property: password

      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "12h"

      # Mail (optional — set manually in dashboard)
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: "noreply@eams.com"

      # Storage
      - key: STORAGE_PATH
        value: "/app/uploads"

      # CORS (set to your frontend URL)
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: eams-db
    plan: starter
    region: oregon
    databaseName: enterprise_asset_management
    user: eams_user
    ipAllowList: []
