# ===========================
# Render Blueprint - EAMS
# https://render.com/docs/blueprint-spec
# ===========================

services:
  # ============================
  # Web Service (Spring Boot)
  # ============================
  - type: web
    name: eams-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: starter
    branch: main
    healthCheckPath: /management/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        fromDatabase:
          name: eams-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: eams-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: eams-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "12h"
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: "noreply@eams.com"
      - key: STORAGE_PATH
        value: "/app/uploads"
      - key: PORT
        value: "8080"

  # ============================
  # PostgreSQL Database
  # ============================
databases:
  - name: eams-db
    plan: starter
    region: oregon
    databaseName: enterprise_asset_management
    user: eams_user
    ipAllowList: []
