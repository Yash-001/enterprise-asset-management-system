# ============================================================================
# CI Pipeline — Build, Test, Package
# ============================================================================
# This workflow runs on every push and pull request to main/develop branches.
# It performs a full Maven build lifecycle: compile → test → verify → package.
#
# Steps:
#   1. Checkout source code
#   2. Setup Java 21 (Eclipse Temurin)
#   3. Cache Maven dependencies (~/.m2/repository)
#   4. Run `mvn clean verify` (compile + unit tests + integration tests)
#   5. Run unit tests (results always uploaded for debugging)
#   6. Package application (produces executable JAR)
#   7. Upload packaged artifact for downstream jobs
# ============================================================================

name: CI — Build & Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build-test-package:
    name: Build → Test → Package
    runs-on: ubuntu-latest

    # -----------------------------------------------------------
    # PostgreSQL service container for integration tests
    # Starts a PostgreSQL instance accessible at localhost:5432
    # -----------------------------------------------------------
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: eams_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d eams_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      # ==========================================================
      # Step 1: Checkout
      # Clones the repository so the workflow can access the code.
      # Uses fetch-depth 0 for full history (useful for versioning).
      # ==========================================================
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ==========================================================
      # Step 2: Setup Java 21
      # Installs Eclipse Temurin JDK 21. The setup-java action also
      # configures JAVA_HOME and adds java/javac to PATH.
      # The 'cache: maven' option enables automatic dependency caching.
      # ==========================================================
      - name: Setup JDK ${{ env.JAVA_VERSION }} (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      # ==========================================================
      # Step 3: Cache Maven dependencies
      # The setup-java action handles primary caching via 'cache: maven'.
      # This step adds a secondary cache for the Maven wrapper to avoid
      # re-downloading it on every run.
      # ==========================================================
      - name: Cache Maven wrapper
        uses: actions/cache@v4
        with:
          path: backend/.mvn/wrapper/maven-wrapper.jar
          key: maven-wrapper-${{ hashFiles('backend/.mvn/wrapper/maven-wrapper.properties') }}

      # ==========================================================
      # Step 4: Run mvn clean verify
      # Executes the full Maven lifecycle up to 'verify' phase:
      #   clean    → removes previous build output
      #   compile  → compiles main sources
      #   test     → runs unit tests (Surefire)
      #   package  → creates JAR
      #   verify   → runs integration tests (Failsafe)
      #
      # Flags:
      #   -B                    → batch mode (no interactive prompts)
      #   --no-transfer-progress → clean CI logs (no download progress bars)
      #   -Dspring.profiles.active=test → activates test profile
      # ==========================================================
      - name: Build and verify (compile + test + integration tests)
        env:
          DB_URL: jdbc:postgresql://localhost:5432/eams_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: dGVzdC1qd3Qtc2VjcmV0LWtleS1mb3ItY2ktcGlwZWxpbmUtb25seQ==
        run: |
          chmod +x mvnw
          ./mvnw clean verify -B --no-transfer-progress

      # ==========================================================
      # Step 5: Upload test results
      # Always uploads Surefire and Failsafe reports regardless of
      # build outcome. This allows debugging test failures in the
      # GitHub Actions UI even when the build fails.
      # ==========================================================
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
          retention-days: 7

      # ==========================================================
      # Step 6: Package application
      # At this point, 'verify' has already produced the JAR.
      # This step simply validates the JAR exists and is runnable.
      # (The JAR was created during the 'package' phase in step 4)
      # ==========================================================
      - name: Verify JAR was produced
        run: |
          JAR_FILE=$(ls target/*.jar 2>/dev/null | grep -v original | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "::error::No JAR artifact found in target/"
            exit 1
          fi
          echo "JAR artifact: $JAR_FILE ($(du -h $JAR_FILE | cut -f1))"
          echo "JAR_PATH=$JAR_FILE" >> $GITHUB_ENV

      # ==========================================================
      # Step 7: Upload packaged artifact
      # Uploads the executable Spring Boot JAR as a build artifact.
      # Downstream jobs (deploy, Docker build) can download this
      # artifact instead of rebuilding from source.
      # Retention: 14 days (configurable).
      # ==========================================================
      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: eams-application
          path: backend/target/*.jar
          if-no-files-found: error
          retention-days: 14
